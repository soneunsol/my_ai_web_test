<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI바이브코딩웹</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #04040f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* 별빛 */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50%       { opacity: var(--o); }
    }

    /* 오로라 */
    .aurora { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .aurora-band {
      position: absolute;
      width: 180%;
      border-radius: 50%;
      filter: blur(100px);
    }
    .aurora-band:nth-child(1) {
      height: 380px;
      background: linear-gradient(90deg, #0a1fff 0%, #7b2ff7 45%, #00c8ff 100%);
      top: -80px; left: -40%; opacity: 0.28;
      animation: flow1 16s ease-in-out infinite;
    }
    .aurora-band:nth-child(2) {
      height: 300px;
      background: linear-gradient(90deg, #ff3cac 0%, #784ba0 50%, #2b86c5 100%);
      top: 60px; left: -20%; opacity: 0.16;
      animation: flow2 22s ease-in-out infinite;
    }
    .aurora-band:nth-child(3) {
      height: 260px;
      background: linear-gradient(90deg, #00f5a0 0%, #00bcd4 50%, #7b2ff7 100%);
      top: 140px; left: -30%; opacity: 0.12;
      animation: flow3 28s ease-in-out infinite;
    }

    @keyframes flow1 {
      0%   { transform: translateX(0%)   scaleY(1)    rotate(-1deg); }
      30%  { transform: translateX(6%)   scaleY(1.15) rotate(1deg);  }
      60%  { transform: translateX(2%)   scaleY(0.92) rotate(-2deg); }
      100% { transform: translateX(0%)   scaleY(1)    rotate(-1deg); }
    }
    @keyframes flow2 {
      0%   { transform: translateX(0%)   scaleY(1)    rotate(1deg);  }
      25%  { transform: translateX(-5%)  scaleY(1.2)  rotate(-1deg); }
      55%  { transform: translateX(4%)   scaleY(0.88) rotate(2deg);  }
      80%  { transform: translateX(-2%)  scaleY(1.1)  rotate(0deg);  }
      100% { transform: translateX(0%)   scaleY(1)    rotate(1deg);  }
    }
    @keyframes flow3 {
      0%   { transform: translateX(0%)   scaleY(1);   }
      40%  { transform: translateX(8%)   scaleY(1.25) rotate(1deg);  }
      70%  { transform: translateX(3%)   scaleY(0.9)  rotate(-1deg); }
      100% { transform: translateX(0%)   scaleY(1);   }
    }

    /* 카드 */
    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(
        160deg,
        rgba(28, 16, 56, 0.75) 0%,
        rgba(10, 10, 32, 0.70) 60%,
        rgba(8, 22, 52, 0.75) 100%
      );
      border: 1px solid transparent;
      border-radius: 28px;
      padding: 60px 52px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(28px);
      background-clip: padding-box;
      box-shadow:
        0 2px 1px rgba(255,255,255,0.06) inset,
        0 -2px 6px rgba(0,0,0,0.4) inset,
        0 24px 64px rgba(80, 30, 180, 0.28),
        0 8px 32px rgba(0, 0, 0, 0.45);
      outline: 1px solid rgba(160, 120, 255, 0.15);
      transition: transform 0.35s ease, box-shadow 0.35s ease, outline-color 0.35s ease;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.005);
      box-shadow:
        0 2px 1px rgba(255,255,255,0.08) inset,
        0 -2px 6px rgba(0,0,0,0.4) inset,
        0 32px 80px rgba(80, 30, 180, 0.38),
        0 12px 40px rgba(0, 0, 0, 0.5);
      outline-color: rgba(160, 120, 255, 0.28);
    }

    /* 아트 이미지 */
    .art-wrap {
      width: 110px;
      height: 110px;
      margin: 0 auto 36px;
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .name {
      font-size: 2.2rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 36px;
      letter-spacing: -0.5px;
      text-shadow: 0 0 24px rgba(123, 47, 247, 0.7), 0 0 48px rgba(0,200,255,0.3);
    }

    .divider {
      width: 56px;
      height: 2px;
      background: linear-gradient(90deg, #7b2ff7, #00c8ff);
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .description {
      font-size: 1.05rem;
      color: rgba(220, 215, 255, 0.88);
      line-height: 1.9;
      margin-bottom: 44px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .tag {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(210, 200, 240, 0.9);
      padding: 7px 18px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    .tag:hover {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(255, 255, 255, 0.25);
      color: rgba(235, 228, 255, 1);
    }

    @media (max-width: 480px) {
      .card { padding: 44px 28px; }
      .name { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="aurora">
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
  </div>

  <div class="card">

    <!-- 아트 이미지: 기하학적 AI 웹 오브 -->
    <div class="art-wrap">
      <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c084fc" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00c8ff"/>
            <stop offset="50%" stop-color="#7b2ff7"/>
            <stop offset="100%" stop-color="#ff3cac"/>
          </linearGradient>
          <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff3cac" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#00c8ff" stop-opacity="0.2"/>
          </linearGradient>
          <filter id="blur-glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- 배경 글로우 -->
        <circle cx="55" cy="55" r="52" fill="url(#glow)"/>

        <!-- 외곽 링 -->
        <ellipse cx="55" cy="55" rx="48" ry="18" stroke="url(#ring1)" stroke-width="1.2" stroke-dasharray="4 3" fill="none" transform="rotate(-25 55 55)"/>
        <ellipse cx="55" cy="55" rx="48" ry="18" stroke="url(#ring2)" stroke-width="1" stroke-dasharray="3 4" fill="none" transform="rotate(55 55 55)"/>
        <ellipse cx="55" cy="55" rx="44" ry="14" stroke="rgba(0,200,255,0.3)" stroke-width="0.8" fill="none" transform="rotate(10 55 55)"/>

        <!-- 연결선 (노드 네트워크) -->
        <line x1="55" y1="55" x2="22" y2="28" stroke="rgba(192,132,252,0.4)" stroke-width="0.8"/>
        <line x1="55" y1="55" x2="88" y2="28" stroke="rgba(0,200,255,0.4)" stroke-width="0.8"/>
        <line x1="55" y1="55" x2="88" y2="82" stroke="rgba(255,60,172,0.4)" stroke-width="0.8"/>
        <line x1="55" y1="55" x2="22" y2="82" stroke="rgba(192,132,252,0.4)" stroke-width="0.8"/>
        <line x1="55" y1="55" x2="55" y2="10" stroke="rgba(0,200,255,0.35)" stroke-width="0.8"/>
        <line x1="55" y1="55" x2="55" y2="100" stroke="rgba(123,47,247,0.35)" stroke-width="0.8"/>
        <line x1="22" y1="28" x2="88" y2="28" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
        <line x1="22" y1="82" x2="88" y2="82" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>

        <!-- 외곽 노드 -->
        <circle cx="22" cy="28" r="3.5" fill="#00c8ff" fill-opacity="0.8" filter="url(#blur-glow)"/>
        <circle cx="88" cy="28" r="3.5" fill="#c084fc" fill-opacity="0.8" filter="url(#blur-glow)"/>
        <circle cx="88" cy="82" r="3.5" fill="#ff3cac" fill-opacity="0.8" filter="url(#blur-glow)"/>
        <circle cx="22" cy="82" r="3.5" fill="#00c8ff" fill-opacity="0.8" filter="url(#blur-glow)"/>
        <circle cx="55" cy="10"  r="2.5" fill="#c084fc" fill-opacity="0.7"/>
        <circle cx="55" cy="100" r="2.5" fill="#7b2ff7" fill-opacity="0.7"/>

        <!-- 중앙 오브 -->
        <circle cx="55" cy="55" r="16" fill="url(#orb)" fill-opacity="0.95" filter="url(#blur-glow)"/>
        <circle cx="55" cy="55" r="16" stroke="rgba(255,255,255,0.25)" stroke-width="1" fill="none"/>
        <!-- 중앙 하이라이트 -->
        <circle cx="50" cy="50" r="5" fill="rgba(255,255,255,0.25)"/>
      </svg>
    </div>

    <h1 class="name">AI바이브코딩웹</h1>
    <div class="divider"></div>
    <p class="description">
      AI바이브코딩웹에서 프롬프트만으로도<br />
      퀄리티 높은 웹을 만들 수 있습니다!
    </p>
    <div class="tags">
      <span class="tag">AI코딩</span>
      <span class="tag">웹개발</span>
      <span class="tag">React</span>
      <span class="tag">WebPortfolio</span>
    </div>
  </div>

  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 180; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.2 + 0.4;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${(Math.random()*4+2).toFixed(1)}s;
        --o:${(Math.random()*0.6+0.3).toFixed(2)};
        --delay:${(Math.random()*6).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
