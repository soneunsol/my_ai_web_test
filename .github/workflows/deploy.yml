name: GitHub Pages 배포

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 포트폴리오 의존성 설치
        working-directory: lecture1/portfolio
        run: npm install

      - name: 포트폴리오 빌드
        working-directory: lecture1/portfolio
        run: npm run build

      - name: my-community 의존성 설치
        working-directory: lecture1/my-community
        run: npm install

      - name: my-community 빌드
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: mini_sns 의존성 설치
        working-directory: lecture1/mini_sns
        run: npm install

      - name: mini_sns 빌드
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 배포 디렉토리 합치기
        run: |
          mkdir -p combined-dist
          cp -r lecture1/portfolio/dist/. combined-dist/
          mkdir -p combined-dist/my-community
          cp -r lecture1/my-community/dist/. combined-dist/my-community/
          mkdir -p combined-dist/mini_sns
          cp -r lecture1/mini_sns/dist/. combined-dist/mini_sns/

      - name: Pages 설정
        uses: actions/configure-pages@v4

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
